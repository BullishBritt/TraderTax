<style>
:root{
  --navy:#0a1628;--green:#3dba7e;--green-dk:#2ea86c;--green-lt:#f0fdf7;
  --bg:#f7f8fb;--surface:#fff;--border:#e5e8ef;--body:#374151;--muted:#6b7280;
  --red:#ef4444;--red-lt:#fff5f5;--amber:#d97706;--amber-lt:#fffbeb;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--navy);min-height:100vh;}
a{text-decoration:none;color:inherit;}

/* LOGIN GATE */
#login-gate{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);}
.login-box{background:var(--surface);border-radius:16px;padding:36px;width:340px;text-align:center;}
.login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:var(--navy);margin-bottom:4px;}
.login-logo span{color:var(--green);}
.login-sub{font-size:.8rem;color:var(--muted);margin-bottom:24px;}
.lg-field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;text-align:left;}
.lg-field label{font-size:.67rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);}
.lg-field input{background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:11px 13px;font-size:.9rem;color:var(--navy);outline:none;width:100%;font-family:'DM Sans',sans-serif;}
.lg-field input:focus{border-color:var(--navy);}
.lg-btn{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:9px;font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;margin-top:4px;}
.lg-btn:hover{background:#0d1f3c;}
.lg-err{font-size:.75rem;color:var(--red);margin-top:8px;display:none;}
.lg-err.show{display:block;}

/* MAIN APP */
#app{display:none;}

/* TOP BAR */
.topbar{background:var(--navy);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:#fff;}
.topbar-logo span{color:var(--green);}
.topbar-right{display:flex;align-items:center;gap:16px;}
.topbar-user{font-size:.78rem;color:rgba(255,255,255,.5);}
.topbar-out{font-size:.78rem;color:var(--green);cursor:pointer;font-weight:600;}
.topbar-out:hover{color:#fff;}

/* PAGE */
.page{max-width:1200px;margin:0 auto;padding:28px 20px 60px;}

/* STATS ROW */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
.stat{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:18px 20px;}
.stat-lbl{font-size:.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.stat-val{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;color:var(--navy);}
.stat-sub{font-size:.72rem;color:var(--muted);margin-top:3px;}
.stat.green .stat-val{color:var(--green-dk);}
.stat.red .stat-val{color:var(--red);}

/* CONTROLS */
.controls{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.ctrl-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;flex:1;}
.filter-btn{padding:7px 14px;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);transition:all .15s;}
.filter-btn:hover{border-color:var(--navy);color:var(--navy);}
.filter-btn.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.filter-btn.red-f.on{background:var(--red);border-color:var(--red);}
.filter-btn.amber-f.on{background:var(--amber);border-color:var(--amber);}
.filter-btn.green-f.on{background:var(--green-dk);border-color:var(--green-dk);}
.search-box{padding:8px 13px;border:1.5px solid var(--border);border-radius:8px;font-size:.82rem;color:var(--navy);outline:none;font-family:'DM Sans',sans-serif;background:var(--surface);width:200px;}
.search-box:focus{border-color:var(--navy);}
.export-btn{padding:8px 16px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;}

/* TABLE */
.table-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;}
.table-head{display:grid;grid-template-columns:80px 1fr 140px 110px 100px 120px 130px 90px;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;gap:12px;}
.th{font-size:.63rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);cursor:pointer;user-select:none;}
.th:hover{color:var(--navy);}

.lead-row{display:grid;grid-template-columns:80px 1fr 140px 110px 100px 120px 130px 90px;padding:14px 16px;gap:12px;border-bottom:1px solid var(--bg);align-items:center;transition:background .1s;cursor:pointer;}
.lead-row:hover{background:#f9fafb;}
.lead-row:last-child{border-bottom:none;}

/* PRIORITY BADGE */
.pri{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:.68rem;font-weight:700;}
.pri.hot{background:#fff0f0;color:var(--red);border:1px solid #fca5a5;}
.pri.warm{background:var(--amber-lt);color:var(--amber);border:1px solid #fde68a;}
.pri.standard{background:var(--green-lt);color:var(--green-dk);border:1px solid #a7f3d0;}

/* CELL TYPES */
.cell-email{font-size:.82rem;color:var(--navy);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cell-phone{font-size:.8rem;color:var(--body);}
.cell-income{font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;color:var(--navy);}
.cell-state{font-size:.8rem;color:var(--body);}
.cell-source{font-size:.7rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--muted);white-space:nowrap;}
.cell-date{font-size:.75rem;color:var(--muted);}

/* EMPTY / LOADING */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:2rem;margin-bottom:10px;}
.loading{text-align:center;padding:50px;color:var(--muted);font-size:.85rem;}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* LEAD DETAIL MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(10,22,40,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.modal-hd{padding:22px 24px 0;display:flex;align-items:flex-start;justify-content:space-between;}
.modal-hd h2{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;}
.modal-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted);padding:2px 6px;}
.modal-body{padding:16px 24px 24px;}
.modal-sec{margin-bottom:18px;}
.modal-sec-title{font-size:.62rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.modal-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--bg);}
.modal-row:last-child{border-bottom:none;}
.modal-key{font-size:.78rem;color:var(--muted);}
.modal-val{font-size:.82rem;color:var(--navy);font-weight:600;text-align:right;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.btn-copy{flex:1;padding:11px;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;font-size:.82rem;font-weight:600;cursor:pointer;color:var(--navy);}
.btn-copy:hover{border-color:var(--navy);}
.btn-handoff{flex:1;padding:11px;background:var(--navy);color:#fff;border:none;border-radius:9px;font-size:.82rem;font-weight:700;cursor:pointer;}
.btn-handoff:hover{background:#0d1f3c;}

/* STATUS BADGE ON ROW */
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.status-dot.new{background:var(--green);}
.status-dot.contacted{background:var(--amber);}
.status-dot.filed{background:var(--muted);}

/* MOBILE */
@media(max-width:900px){
  .stats{grid-template-columns:1fr 1fr;}
  .table-head{display:none;}
  .lead-row{grid-template-columns:1fr;gap:4px;padding:14px 16px;}
  .lead-row .cell-source,.lead-row .cell-date{display:none;}
}
@media(max-width:560px){
  .stats{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div id="login-gate">
  <div class="login-box">
    <div class="login-logo">Trader<span>Tax</span></div>
    <div class="login-sub">Admin access only</div>
    <div class="lg-field">
      <label>Email</label>
      <input type="email" id="lg-email" placeholder="hello@tradertax.net" onkeydown="if(event.key==='Enter')lgIn()"/>
    </div>
    <div class="lg-field">
      <label>Password</label>
      <input type="password" id="lg-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')lgIn()"/>
    </div>
    <button class="lg-btn" onclick="lgIn()">Sign In to Dashboard</button>
    <div class="lg-err" id="lg-err">Incorrect credentials. Admin only.</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">Trader<span>Tax</span> <span style="font-size:.7rem;color:rgba(255,255,255,.4);font-family:'DM Sans',sans-serif;font-weight:400;margin-left:8px;">Admin</span></div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-user"></span>
      <span class="topbar-out" onclick="signOut()">Sign Out</span>
    </div>
  </div>

  <div class="page">

    <!-- STATS -->
    <div class="stats" id="stats-row">
      <div class="stat">
        <div class="stat-lbl">Total Leads</div>
        <div class="stat-val" id="s-total">—</div>
        <div class="stat-sub">All time</div>
      </div>
      <div class="stat red">
        <div class="stat-lbl">🔴 High Priority</div>
        <div class="stat-val" id="s-hot">—</div>
        <div class="stat-sub">$50K+ income</div>
      </div>
      <div class="stat" style="--amber:#d97706;">
        <div class="stat-lbl">🟡 Warm</div>
        <div class="stat-val" id="s-warm" style="color:var(--amber)">—</div>
        <div class="stat-sub">$20K–$50K income</div>
      </div>
      <div class="stat green">
        <div class="stat-lbl">New This Week</div>
        <div class="stat-val" id="s-week">—</div>
        <div class="stat-sub">Last 7 days</div>
      </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <div class="ctrl-title">All Leads</div>
      <input class="search-box" type="text" id="search" placeholder="🔍  Search email or state…" oninput="renderTable()"/>
      <button class="filter-btn on" id="f-all" onclick="setFilter('all')">All</button>
      <button class="filter-btn red-f" id="f-hot" onclick="setFilter('hot')">🔴 High Priority</button>
      <button class="filter-btn amber-f" id="f-warm" onclick="setFilter('warm')">🟡 Warm</button>
      <button class="filter-btn green-f" id="f-standard" onclick="setFilter('standard')">🟢 Standard</button>
      <button class="export-btn" onclick="exportCSV()">↓ Export CSV</button>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <div class="table-head">
        <div class="th" onclick="sortBy('priority')">Priority</div>
        <div class="th" onclick="sortBy('email')">Email</div>
        <div class="th" onclick="sortBy('phone')">Phone</div>
        <div class="th" onclick="sortBy('income')">Total Income</div>
        <div class="th" onclick="sortBy('state')">State</div>
        <div class="th" onclick="sortBy('trades')">Trades</div>
        <div class="th" onclick="sortBy('source')">Source</div>
        <div class="th" onclick="sortBy('date')">Date</div>
      </div>
      <div id="table-body">
        <div class="loading"><span class="spin"></span>Loading leads…</div>
      </div>
    </div>

  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hd">
      <h2 id="m-title">Lead Detail</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const db = firebase.firestore();
const auth = firebase.auth();
let allLeads = [];
let activeFilter = 'all';
let sortField = 'date';
let sortDir = -1;

// ADMIN EMAILS — only these can access
const ADMIN_EMAILS = ['hello@tradertax.net', 'brittainalfaro@gmail.com', 'brittain0404@yahoo.com'];

// ===== AUTH =====
async function lgIn() {
  const email = document.getElementById('lg-email').value.trim();
  const pw = document.getElementById('lg-pw').value;
  const err = document.getElementById('lg-err');
  err.classList.remove('show');
  try {
    const cred = await auth.signInWithEmailAndPassword(email, pw);
    if (!ADMIN_EMAILS.includes(cred.user.email)) {
      await auth.signOut();
      err.textContent = 'Access denied — admin only.';
      err.classList.add('show');
      return;
    }
    showApp(cred.user);
  } catch(e) {
    err.textContent = 'Incorrect email or password.';
    err.classList.add('show');
  }
}

function signOut() {
  auth.signOut();
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-gate').style.display = 'flex';
}

auth.onAuthStateChanged(user => {
  if (user && ADMIN_EMAILS.includes(user.email)) {
    showApp(user);
  }
});

function showApp(user) {
  document.getElementById('login-gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('topbar-user').textContent = user.email;
  loadLeads();
}

// ===== PRIORITY SCORING =====
function getPriority(lead) {
  const income = totalIncome(lead);
  if (income >= 50000) return 'hot';
  if (income >= 20000) return 'warm';
  return 'standard';
}

function totalIncome(lead) {
  return (lead.w2||0) + (lead.prop||0) + (lead.pnl||0) + (lead.futuresPnl||0) + (lead.otherSe||0);
}

function priLabel(p) {
  if (p==='hot') return '<span class="pri hot">🔴 High</span>';
  if (p==='warm') return '<span class="pri warm">🟡 Warm</span>';
  return '<span class="pri standard">🟢 Standard</span>';
}

// ===== LOAD DATA =====
async function loadLeads() {
  try {
    // Pull from both collections and merge by email
    const [calcSnap, snapSnap] = await Promise.all([
      db.collection('calculator_leads').orderBy('createdAt','desc').limit(500).get().catch(()=>({docs:[]})),
      db.collection('leads').orderBy('createdAt','desc').limit(500).get().catch(()=>({docs:[]}))
    ]);

    const leadMap = {};

    calcSnap.docs.forEach(doc => {
      const d = doc.data();
      const key = (d.email||doc.id).toLowerCase();
      leadMap[key] = {
        id: doc.id, email: d.email||'', phone: d.phone||'',
        w2: d.w2||0, prop: d.prop||0, pnl: d.pnl||0,
        futuresPnl: d.futuresPnl||0, otherSe: d.otherSe||0,
        expenses: d.expenses||0,
        state: d.stateCode||d.state||'', filing: d.filing||'',
        trades: d.trades||'', entity: d.entity||'',
        estimatedTax: d.estimatedTax||0,
        source: 'calculator',
        createdAt: d.createdAt?.toDate ? d.createdAt.toDate() : new Date(),
        status: d.status||'new', notes: d.notes||''
      };
    });

    snapSnap.docs.forEach(doc => {
      const d = doc.data();
      const key = (d.email||doc.id).toLowerCase();
      if (leadMap[key]) {
        // Merge — enrich existing record
        leadMap[key].source = 'calc + snapshot';
        leadMap[key].phone = leadMap[key].phone || d.phone||'';
      } else {
        leadMap[key] = {
          id: doc.id, email: d.email||'', phone: d.phone||'',
          w2: d.w2||0, prop: d.prop||0, pnl: 0, futuresPnl: 0, otherSe: 0,
          expenses: 0, state: d.state||'', filing: '', trades: d.trades||'',
          entity: '', estimatedTax: 0,
          source: 'snapshot',
          createdAt: d.createdAt?.toDate ? d.createdAt.toDate() : new Date(),
          status: d.status||'new', notes: d.notes||''
        };
      }
    });

    allLeads = Object.values(leadMap).sort((a,b) => b.createdAt - a.createdAt);
    updateStats();
    renderTable();
  } catch(e) {
    console.error(e);
    document.getElementById('table-body').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>Error loading leads: ${e.message}</div>`;
  }
}

// ===== STATS =====
function updateStats() {
  const now = new Date();
  const week = new Date(now - 7*24*60*60*1000);
  const hot = allLeads.filter(l=>getPriority(l)==='hot');
  const warm = allLeads.filter(l=>getPriority(l)==='warm');
  const newWeek = allLeads.filter(l=>l.createdAt > week);
  document.getElementById('s-total').textContent = allLeads.length;
  document.getElementById('s-hot').textContent = hot.length;
  document.getElementById('s-warm').textContent = warm.length;
  document.getElementById('s-week').textContent = newWeek.length;
}

// ===== FILTERS & SORT =====
function setFilter(f) {
  activeFilter = f;
  ['all','hot','warm','standard'].forEach(id => {
    document.getElementById('f-'+id).classList.toggle('on', id===f);
  });
  renderTable();
}

function sortBy(field) {
  if (sortField===field) sortDir *= -1;
  else { sortField=field; sortDir=-1; }
  renderTable();
}

// ===== RENDER TABLE =====
function renderTable() {
  const search = document.getElementById('search').value.toLowerCase();

  let leads = allLeads.filter(l => {
    const pri = getPriority(l);
    if (activeFilter!=='all' && pri!==activeFilter) return false;
    if (search) {
      const hay = (l.email+l.phone+l.state+l.trades).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  leads.sort((a,b) => {
    const priOrder = {hot:0,warm:1,standard:2};
    if (sortField==='priority') return sortDir*(priOrder[getPriority(a)]-priOrder[getPriority(b)]);
    if (sortField==='income') return sortDir*(totalIncome(b)-totalIncome(a));
    if (sortField==='date') return sortDir*(b.createdAt-a.createdAt);
    if (sortField==='email') return sortDir*a.email.localeCompare(b.email);
    return 0;
  });

  if (!leads.length) {
    document.getElementById('table-body').innerHTML = `<div class="empty"><div class="empty-icon">📭</div>No leads match this filter.</div>`;
    return;
  }

  document.getElementById('table-body').innerHTML = leads.map(l => {
    const pri = getPriority(l);
    const income = totalIncome(l);
    const date = l.createdAt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const trades = l.trades ? l.trades.split(',').slice(0,2).join(', ') : '—';
    return `<div class="lead-row" onclick='openModal(${JSON.stringify(l).replace(/'/g,"&#39;")})'>
      <div>${priLabel(pri)}</div>
      <div class="cell-email">${l.email||'—'}</div>
      <div class="cell-phone">${l.phone||'—'}</div>
      <div class="cell-income">${income>0?'$'+income.toLocaleString():'—'}</div>
      <div class="cell-state">${l.state||'—'}</div>
      <div class="cell-state" style="font-size:.75rem">${trades}</div>
      <div class="cell-source"><span class="cell-source">${l.source}</span></div>
      <div class="cell-date">${date}</div>
    </div>`;
  }).join('');
}

// ===== MODAL =====
function openModal(l) {
  const income = totalIncome(l);
  const pri = getPriority(l);
  const priText = {hot:'🔴 High Priority ($50K+)',warm:'🟡 Warm ($20K–$50K)',standard:'🟢 Standard (under $20K)'};

  document.getElementById('m-title').textContent = l.email || 'Lead Detail';
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-sec">
      <div class="modal-sec-title">Contact</div>
      <div class="modal-row"><span class="modal-key">Email</span><span class="modal-val"><a href="mailto:${l.email}" style="color:var(--navy)">${l.email||'—'}</a></span></div>
      <div class="modal-row"><span class="modal-key">Phone</span><span class="modal-val"><a href="tel:${l.phone}" style="color:var(--navy)">${l.phone||'—'}</a></span></div>
      <div class="modal-row"><span class="modal-key">Priority</span><span class="modal-val">${priText[pri]}</span></div>
      <div class="modal-row"><span class="modal-key">Source</span><span class="modal-val">${l.source}</span></div>
      <div class="modal-row"><span class="modal-key">Date</span><span class="modal-val">${l.createdAt.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</span></div>
    </div>
    <div class="modal-sec">
      <div class="modal-sec-title">Income Breakdown</div>
      <div class="modal-row"><span class="modal-key">W-2 / Salary</span><span class="modal-val">${l.w2>0?'$'+l.w2.toLocaleString():'—'}</span></div>
      <div class="modal-row"><span class="modal-key">Prop Firm Payouts</span><span class="modal-val">${l.prop>0?'$'+l.prop.toLocaleString():'—'}</span></div>
      <div class="modal-row"><span class="modal-key">Trading P&L</span><span class="modal-val">${l.pnl!==0?'$'+l.pnl.toLocaleString():'—'}</span></div>
      <div class="modal-row"><span class="modal-key">Futures P&L</span><span class="modal-val">${l.futuresPnl!==0?'$'+l.futuresPnl.toLocaleString():'—'}</span></div>
      <div class="modal-row"><span class="modal-key">Total Income</span><span class="modal-val" style="color:var(--navy);font-weight:800">${income>0?'$'+income.toLocaleString():'—'}</span></div>
      <div class="modal-row"><span class="modal-key">Deductible Expenses</span><span class="modal-val" style="color:var(--green-dk)">${l.expenses>0?'-$'+l.expenses.toLocaleString():'—'}</span></div>
    </div>
    <div class="modal-sec">
      <div class="modal-sec-title">Tax Profile</div>
      <div class="modal-row"><span class="modal-key">State</span><span class="modal-val">${l.state||'—'}</span></div>
      <div class="modal-row"><span class="modal-key">Filing Status</span><span class="modal-val">${l.filing||'—'}</span></div>
      <div class="modal-row"><span class="modal-key">Instruments Traded</span><span class="modal-val">${l.trades||'—'}</span></div>
      <div class="modal-row"><span class="modal-key">Entity</span><span class="modal-val">${l.entity||'None'}</span></div>
      <div class="modal-row"><span class="modal-key">Estimated Tax</span><span class="modal-val" style="color:var(--red)">${l.estimatedTax>0?'$'+l.estimatedTax.toLocaleString():'—'}</span></div>
    </div>
    <div class="modal-actions">
      <button class="btn-copy" onclick="copyHandoff(${JSON.stringify(l).replace(/"/g,'&quot;')})">📋 Copy CPA Summary</button>
      <button class="btn-handoff" onclick="emailLead('${l.email}')">✉️ Send Email</button>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}

function emailLead(email) {
  window.location.href = `mailto:${email}?subject=Your%20TraderTax%20Filing%20Is%20Ready%20to%20Start`;
}

function copyHandoff(l) {
  const income = totalIncome(l);
  const text = `TRADERTAX — CPA CLIENT SUMMARY
==============================
Email: ${l.email}
Phone: ${l.phone||'N/A'}
Date: ${l.createdAt.toLocaleDateString()}
Source: ${l.source}

INCOME
W-2/Salary: $${(l.w2||0).toLocaleString()}
Prop Firm Payouts: $${(l.prop||0).toLocaleString()}
Trading P&L: $${(l.pnl||0).toLocaleString()}
Futures P&L: $${(l.futuresPnl||0).toLocaleString()}
Other SE: $${(l.otherSe||0).toLocaleString()}
Deductible Expenses: -$${(l.expenses||0).toLocaleString()}
TOTAL INCOME: $${income.toLocaleString()}

TAX PROFILE
State: ${l.state||'N/A'}
Filing Status: ${l.filing||'N/A'}
Instruments: ${l.trades||'N/A'}
Entity: ${l.entity||'None'}
Estimated Tax (calculator): $${(l.estimatedTax||0).toLocaleString()}

PRIORITY: ${getPriority(l).toUpperCase()}
==============================`;
  navigator.clipboard.writeText(text).then(()=>alert('CPA summary copied to clipboard!'));
}

// ===== EXPORT CSV =====
function exportCSV() {
  const headers = ['Priority','Email','Phone','W2','Prop','PnL','Futures','OtherSE','Expenses','TotalIncome','State','Filing','Trades','Entity','EstTax','Source','Date'];
  const rows = allLeads.map(l => {
    const income = totalIncome(l);
    return [
      getPriority(l), l.email, l.phone,
      l.w2, l.prop, l.pnl, l.futuresPnl, l.otherSe, l.expenses, income,
      l.state, l.filing, l.trades, l.entity, l.estimatedTax,
      l.source, l.createdAt.toLocaleDateString()
    ].map(v => `"${v}"`).join(',');
  });
  const csv = [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `tradertax-leads-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
</body>
</html>
